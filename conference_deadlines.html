<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>8-Bit Conference Deadline</title>
    <!-- Import a pixel font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #202028;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

	nav ul {
	  list-style: none;
	  display: flex;
	  justify-content: center;
	  gap: 1.5rem;
	  margin-top: 1.5rem;
	  flex-wrap: wrap;
	}
        h1 {
            color: #fca044;
            text-shadow: 4px 4px #000;
            margin-bottom: 10px;
            font-size: 24px;
            text-align: center;
            line-height: 1.5;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 10px;
            color: #aaa;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid #000;
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 0 0 4px #000, 0 0 0 8px #4a4a5a;
            border-radius: 4px;
            background-color: #8b9bb4; /* Sky blue-ish */
            cursor: crosshair;
            min-height: 400px; /* Prevent layout shift while loading */
        }

        canvas {
            display: block;
            image-rendering: pixelated; /* Crucial for 8-bit look */
        }

        /* The Tooltip / Info Box */
        #info-box {
            position: absolute;
            display: none;
            background: #fff;
            border: 4px solid #000;
            padding: 15px;
            width: 250px;
            color: #000;
            font-size: 10px;
            line-height: 1.6;
            pointer-events: none; /* Let mouse pass through */
            z-index: 10;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.5);
        }

        #info-box h2 {
            margin-top: 0;
            color: #d95763;
            font-size: 14px;
            border-bottom: 2px dashed #000;
            padding-bottom: 5px;
        }

        .status-past { color: #666; }
        .status-soon { color: #d95763; font-weight: bold; }
        .status-upcoming { color: #639bff; }
        
        #loading-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 12px;
        }
    </style>
      <nav>
      <ul>
        <li><a href="#about">ABOUT</a></li>
        <li><a href="#projects">PROJECTS & VIS</a></li>
        <li><a href="./publications.html">PUBLICATIONS</a></li>
        <li><a href="./conference_deadlines.html">CONFERENCE_DEADLINES</a></li>
        <li><a href="#contact">CONTACT</a></li>
        <li><a href="assets/files/cv_jrvc.pdf" target="_blank">[ DOWNLOAD CV ]</a></li>
      </ul>
    </nav>
</head>
<body>

    <h1>CONFERENCE DEADLINES<br><span style="font-size:12px; color:#fff;">2025 - 2026 EDITION</span></h1>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#ac3232"></div>PAST</div>
        <div class="legend-item"><div class="dot" style="background:#d95763"></div>URGENT (&lt;30 days)</div>
        <div class="legend-item"><div class="dot" style="background:#fbf236"></div>UPCOMING</div>
    </div>

    <div id="canvas-container">
        <p id="loading-msg">Loading Quest Map...</p>
        <canvas id="gameCanvas" width="1000" height="400"></canvas>
        <div id="info-box"></div>
    </div>

    <!-- Load the Logic -->
    <script src="assets/js/conference_deadlines.js"></script>

</body>
</html>
