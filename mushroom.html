<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction | Raúl Vázquez</title>
  
  <!-- Retro & Readable Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Cute Pastel-Retro Palette */
      --bg-color: #FFF5F7;        /* Soft warm white/pink */
      --bg-pattern: #FFE4EC;      /* Slightly darker pink for dots */
      --card-bg: #FFFFFF;
      --text-main: #2D1B2E;       /* Soft dark purple/black */
      --text-muted: #8A7A8B;
      --accent: #FF85A2;          /* Cute pastel pink */
      --accent-hover: #FF5C8A;
      --secondary: #A2D2FF;       /* Soft pastel blue */
      --shadow: #CDB4DB;          /* Pastel purple shadow */
      --border-width: 4px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      background-image: radial-gradient(var(--bg-pattern) 15%, transparent 16%);
      background-size: 20px 20px;
      color: var(--text-main);
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column; /* Changed to column to stack banner and container */
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 500px;
      width: 100%;
      text-align: center;
      margin-top: 2rem; /* Space between banner and card */
    }

.pixel-banner {
  width: 100%;
  max-width: 1200px;
  min-height: 200px;
  margin: 0 auto 2rem auto; /* Spaces it nicely above your main container */
  position: relative;
  background-color: var(--bg-color);
  border: var(--border-width) solid var(--text-main);
  box-shadow: 8px 8px 0px var(--shadow);
  overflow: hidden;
  display: flex;
  align-items: center;
}

.banner-text-area {
  flex: 1.25;
  padding: 0 2rem;
  z-index: 1;
  text-align: left;
}

.banner-text-area h2 {
  font-family: 'Press Start 2P', cursive;
  font-size: 1.2rem;
  color: var(--accent);
  margin-bottom: 0.8rem;
  line-height: 1.2;
  text-transform: uppercase;
}

.banner-text-area p {
  font-family: 'VT323', monospace;
  font-size: 1.5rem;
  color: var(--text-muted);
  margin: 0;
}

.banner-art-area {
  flex: 1.4;
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.pixel-banner svg {
  display: block;
  width: 100%;
  height: auto;
  image-rendering: pixelated;
  shape-rendering: crispEdges;
}

/* --- Spores --- */
.spore {
  position: absolute;
  width: 4px;
  height: 4px;
  background-color: #ffffff;
  opacity: 0;
  /* Pastel pink accent shadow for a cute, crisp pixel glow */
  box-shadow: 1px 0 0 var(--accent), 0 1px 0 var(--accent), 1px 1px 0 var(--accent); 
}

.spore-1 { left: 60%; bottom: 30%; animation: drift 6s linear infinite; animation-delay: 0s; }
.spore-2 { left: 75%; bottom: 40%; animation: drift 7s linear infinite; animation-delay: 2s; }
.spore-3 { left: 85%; bottom: 25%; animation: drift 5.5s linear infinite; animation-delay: 4s; }
.spore-4 { left: 30%; bottom: 25%; animation: drift 5.5s linear infinite; animation-delay: 4s; }


@keyframes drift {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  20% { opacity: 0.7; }
  80% { opacity: 0.5; }
  100% { transform: translateY(-50px) translateX(10px); opacity: 0; }
}

.cloud-move {
  animation: move-cloud 25s linear infinite;
}

.cloud-bounce {
  animation: bounce-cloud 5s ease-in-out infinite;
}

.sun-rays {
  transform-origin: 32px 32px;
  animation: sun-spin 168s linear infinite;
}

@keyframes move-cloud {
  0% { transform: translateX(0); }
  50% { transform: translateX(100px); } 
  100% { transform: translateX(-50px); }
}

@keyframes bounce-cloud {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-10px); }
}  

/* --- Animations --- */
.mushroom-group {
  animation: gentle-bob 4s ease-in-out infinite;
  transform-origin: bottom center;
}

@keyframes gentle-bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); } /* Only 4px, barely noticeable but alive */
}

@keyframes move-across {
  0% { transform: translateX(0); }
  50% { transform: translateX(30px); } /* Gentle breathing drift instead of flying across */
  100% { transform: translateX(0); }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* Accessibility: Respect user's reduced motion preferences */
@media (prefers-reduced-motion: reduce) {
  .spore, .mushroom-group, .cloud-move, .cloud-bounce {
    animation: none !important;
  }
  .spore { opacity: 0.5; }
}

@media (max-width: 768px) {

  .pixel-banner {
    flex-direction: column;
  }

  .banner-text-area {
    text-align: center;
    padding: 2rem 2rem 0 2rem; 
  }

  .banner-text-area h2 {
    font-size: 0.75rem;
  }
  .banner-text-area p {
  font-size: 0.9rem;
  }

  .banner-art-area {
    width: 75%;
  }
}

@keyframes sun-spin {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

  </style>
</head>
<body>

  <!-- Banner Section -->
 <div class="pixel-banner">
  
  <!-- Left Side: Space for text -->
  <div class="banner-text-area">
    <h2>The *SHROOM Shared Task Series</h2>
    <p>Hallucinations and Related Observable Overgenerations</p>
  </div>
  
  <!-- Right Side: Art & Animation -->
  <div class="banner-art-area">
    
    <!-- Floating Spores -->
    <div class="spore spore-1"></div>
    <div class="spore spore-2"></div>
    <div class="spore spore-3"></div>
    <div class="spore spore-4"></div>

    <!-- Shifted SVG Landscape -->
    <svg viewBox="80 -50 1200 300">
      <!-- Sky -->
      <rect width="1200" height="220" fill="#FFF5F7"/>

      <!-- Sun -->
      <g transform="translate(1000 20)">
        <g class="sun-rays">
          <!-- top bottom left right-->
          <rect x="28" y="-18" width="8" height="12" fill="#FFD166"/>
          <rect x="28" y="70" width="8" height="12" fill="#FFD166"/>
          <rect x="-18" y="28" width="12" height="8" fill="#FFD166"/>
          <rect x="70" y="28" width="12" height="8" fill="#FFD166"/>
        </g>
        <!-- Sun body -->
        <g>
          <rect x="12" y="0" width="40" height="8" fill="#FFD166"/>
          <rect x="4" y="8" width="56" height="8" fill="#FFD166"/>
          <rect x="0" y="16" width="64" height="32" fill="#FFD166"/>
          <rect x="4" y="48" width="56" height="8" fill="#FFD166"/>
          <rect x="12" y="56" width="40" height="8" fill="#FFD166"/>
        </g>
      </g>

      <!-- Clouds -->
      <g class="cloud-move">
        <g class="cloud-bounce">
          <g fill="#ffffff">
            <rect x="450" y="30" width="15" height="20"/>
            <rect x="500" y="40" width="30" height="10"/>
            <rect x="530" y="30" width="40" height="20"/>
            <rect x="570" y="40" width="30" height="10"/>
            <rect x="900" y="50" width="30" height="10"/>
            <rect x="930" y="40" width="40" height="20"/>
            <rect x="970" y="50" width="50" height="10"/>
          </g>
        </g>
      </g>
      
      <!-- Ground -->
      <rect x="0" y="160" width="1200" height="60" fill="#BEE3A8"/>

      <!-- Middle part -->
      <rect x="300" y="130" width="850" height="30" fill="#D6F0D1"/>

      <!-- Distant part -->
      <g fill="#EDF7EB">
      <rect x="325" y="100" width="250" height="30" />
      <rect x="350" y="80" width="40" height="30" />
      <rect x="475" y="80" width="50" height="30" />

      <rect x="800" y="100" width="300" height="30" />
      <rect x="900" y="80" width="150" height="30" />
      </g>

      <!-- BACK MUSHROOMS -->
      <g>
        <rect x="440" y="105" width="22" height="55" fill="#F6F1D1"/>
        <rect x="410" y="70" width="80" height="40" fill="#FF9BB8"/>
        <rect x="860" y="100" width="25" height="60" fill="#F6F1D1"/>
        <rect x="825" y="60" width="95" height="45" fill="#A2D2FF"/>
      </g>

      <!-- FOREGROUND MUSHROOMS -->
      <g>
        <rect x="550" y="135" width="18" height="35" fill="#F6F1D1"/>
        <rect x="525" y="110" width="65" height="25" fill="#FF85A2"/>
        <rect x="950" y="130" width="20" height="40" fill="#F6F1D1"/>
        <rect x="920" y="105" width="80" height="25" fill="#A2D2FF"/>
        <rect x="1080" y="140" width="15" height="30" fill="#F6F1D1"/>
        <rect x="1055" y="120" width="65" height="20" fill="#CDB4DB"/>
      </g>
      
      <!-- MAIN MUSHROOM -->
      <g class="mushroom-group">
        <rect x="645" y="95" width="110" height="80" fill="#F6F1D1"/>
        <rect x="530" y="25" width="340" height="70" fill="#FF85A2"/>
        <rect x="565" y="0" width="270" height="25" fill="#FF85A2"/>
        <rect x="600" y="30" width="30" height="20" fill="#ffffff"/>
        <rect x="720" y="20" width="35" height="25" fill="#ffffff"/>
        <rect x="790" y="45" width="25" height="18" fill="#ffffff"/>
        <rect x="660" y="55" width="20" height="15" fill="#ffffff"/>
      </g>

      <!-- Grass -->
      <g fill="#58A65C">
        <rect x="520" y="150" width="4" height="20"/>
        <rect x="530" y="145" width="4" height="25"/>
        <rect x="540" y="152" width="4" height="18"/>
        
        <rect x="720" y="180" width="4" height="20"/>
        <rect x="730" y="175" width="4" height="25"/>
        <rect x="740" y="182" width="4" height="18"/>
        
        <rect x="1080" y="150" width="4" height="20"/>
        <rect x="1090" y="145" width="4" height="25"/>
        <rect x="1100" y="152" width="4" height="18"/>
      </g>
      
      <!-- Flowers -->
      <g>
        <rect x="505" y="170" width="3" height="20" fill="#58A65C"/>
        <rect x="500" y="165" width="12" height="12" fill="#FFD166"/>
        
        
        <rect x="775" y="150" width="3" height="15" fill="#58A65C"/>
        <rect x="765" y="145" width="12" height="12" fill="#FF85A2"/>
        
        <rect x="1070" y="160" width="3" height="20" fill="#58A65C"/>
        <rect x="1065" y="155" width="12" height="12" fill="#FFD166"/>
        
        <rect x="1146" y="155" width="3" height="15" fill="#58A65C"/>
        <rect x="1145" y="150" width="12" height="12" fill="#FF85A2"/>
      </g>
      
    </svg>
  </div>
</div>
</body>
</html>
